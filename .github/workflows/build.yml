name: Build Smart Tracker

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:

  build-macos:
    name: Build macOS (.app)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 numpy tifffile scipy scikit-image opencv-python pyinstaller

      - name: Build .app
        run: pyinstaller smart_tracker.spec --clean

      - name: Zip .app for upload
        run: |
          cd dist
          zip -r "Smart_Tracker_macOS.zip" "Smart Tracker.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Tracker-macOS
          path: dist/Smart_Tracker_macOS.zip

  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 numpy tifffile scipy scikit-image opencv-python pyinstaller

      - name: Build .exe
        run: pyinstaller smart_tracker_win.spec --clean

      - name: Zip .exe for upload
        run: Compress-Archive -Path dist\SmartTracker\* -DestinationPath dist\Smart_Tracker_Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Tracker-Windows
          path: dist/Smart_Tracker_Windows.zip

  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Smart-Tracker-macOS
          path: release/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Smart-Tracker-Windows
          path: release/

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --repo ${{ github.repository }} --yes 2>/dev/null || true
          git -c protocol.version=2 ls-remote --tags origin | grep -q "refs/tags/latest" && \
            gh api -X DELETE /repos/${{ github.repository }}/git/refs/tags/latest || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Smart Tracker — Latest Build"
          body: |
            Ultima build automatica da `main`.

            **Download:**
            - `Smart_Tracker_macOS.zip` — macOS (.app, richiede macOS 12+)
            - `Smart_Tracker_Windows.zip` — Windows (portabile, nessun installer)

            ---
            *Build generata automaticamente da GitHub Actions.*
          files: |
            release/Smart_Tracker_macOS.zip
            release/Smart_Tracker_Windows.zip
          make_latest: true
