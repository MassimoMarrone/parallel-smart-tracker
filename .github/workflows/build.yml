name: Build Smart Tracker

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:

  build-macos:
    name: Build macOS (.app)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 numpy tifffile scipy scikit-image opencv-python pyinstaller

      - name: Build .app
        run: pyinstaller smart_tracker.spec --clean

      - name: Zip .app for upload
        run: |
          cd dist
          zip -r "Smart_Tracker_macOS.zip" "Smart Tracker.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Tracker-macOS
          path: dist/Smart_Tracker_macOS.zip

  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 numpy tifffile scipy scikit-image opencv-python pyinstaller

      - name: Build .exe
        run: pyinstaller smart_tracker_win.spec --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Tracker-Windows
          path: dist/SmartTracker/
